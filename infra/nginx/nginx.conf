# ============================================================================
# nginx.conf — Reverse proxy production pour le-provencal.ovh
# Rate limiting, headers sécu, suppression Server, pages d'erreur custom
# ============================================================================

# Exécution en tant qu'utilisateur non-root
user  nginx;
worker_processes  auto;
pid        /var/run/nginx.pid;
error_log  /var/log/nginx/error.log warn;

events {
    worker_connections  512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Suppression des headers qui leakent la stack ────────────────────
    server_tokens  off;                    # Supprime "nginx/x.x" du header Server
    more_set_headers 'Server: ';           # Vide complètement le header Server
    # Note : si le module headers-more n'est pas dispo, utiliser proxy_hide_header

    # ── Logging ─────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;
    client_max_body_size  10M;   # Limite upload (CSV/images)

    # ── Rate limiting ───────────────────────────────────────────────────
    # Zone globale : 10 req/s par IP (burst de 20, sans délai pour les 20 premières)
    limit_req_zone  $binary_remote_addr  zone=global:10m  rate=10r/s;
    # Zone login : 3 req/s par IP (anti brute-force)
    limit_req_zone  $binary_remote_addr  zone=login:10m   rate=3r/s;
    limit_req_status 429;

    # ── Gzip ────────────────────────────────────────────────────────────
    gzip  on;
    gzip_types  text/plain text/css application/json application/javascript
                text/xml application/xml application/xml+rss text/javascript
                image/svg+xml;
    gzip_min_length  256;

    # ── Pages d'erreur custom (aucun leak de stack technique) ───────────
    # Fichiers dans /usr/share/nginx/error-pages/
    map $status $error_page_file {
        400  /usr/share/nginx/error-pages/400.html;
        403  /usr/share/nginx/error-pages/403.html;
        404  /usr/share/nginx/error-pages/404.html;
        429  /usr/share/nginx/error-pages/429.html;
        500  /usr/share/nginx/error-pages/500.html;
        502  /usr/share/nginx/error-pages/502.html;
        503  /usr/share/nginx/error-pages/503.html;
    }

    # ── Upstream ────────────────────────────────────────────────────────
    upstream backend_api {
        server provencalia-back:8000;
    }

    upstream frontend_app {
        server provencalia-front:80;
    }

    # ── HTTP → HTTPS redirect ───────────────────────────────────────────
    server {
        listen 80;
        server_name le-provencal.ovh www.le-provencal.ovh;

        # Certbot ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check interne pour le healthcheck Docker
        location = /health-nginx {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # Tout le reste → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS principal ─────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name le-provencal.ovh www.le-provencal.ovh;

        # ── Certificats Let's Encrypt ───────────────────────────────────
        ssl_certificate      /etc/letsencrypt/live/le-provencal.ovh/fullchain.pem;
        ssl_certificate_key  /etc/letsencrypt/live/le-provencal.ovh/privkey.pem;

        # ── TLS durci ──────────────────────────────────────────────────
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers  on;
        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  1d;
        ssl_session_tickets  off;

        # HSTS (6 mois)
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

        # ── Headers de sécurité / anonymat ─────────────────────────────
        add_header X-Content-Type-Options    "nosniff"                      always;
        add_header X-Frame-Options           "SAMEORIGIN"                   always;
        add_header X-XSS-Protection          "1; mode=block"                always;
        add_header Referrer-Policy           "no-referrer"                  always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;

        # Supprimer les headers backend qui leakent
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;

        # ── Pages d'erreur custom ──────────────────────────────────────
        error_page 400 /error/400.html;
        error_page 403 /error/403.html;
        error_page 404 /error/404.html;
        error_page 429 /error/429.html;
        error_page 500 /error/500.html;
        error_page 502 /error/502.html;
        error_page 503 /error/503.html;

        location /error/ {
            internal;
            alias /usr/share/nginx/error-pages/;
        }

        # ── API Backend (/api, /health, /static) ──────────────────────
        location /api/ {
            limit_req zone=global burst=20 nodelay;

            proxy_pass         http://backend_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # Health check backend
        location = /health {
            proxy_pass         http://backend_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Images statiques backend
        location /static/ {
            proxy_pass         http://backend_api;
            proxy_set_header   Host              $host;
            expires            7d;
            add_header         Cache-Control "public, immutable";
        }

        # Endpoint login — rate limiting renforcé
        location = /api/v1/auth/login {
            limit_req zone=login burst=5 nodelay;

            proxy_pass         http://backend_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Frontend (SPA React) ──────────────────────────────────────
        location / {
            proxy_pass         http://frontend_app;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Cache assets buildés (fingerprinted par Vite)
            location ~* \.(js|css|svg|png|jpg|jpeg|webp|ico|woff2?)$ {
                proxy_pass     http://frontend_app;
                expires        30d;
                add_header     Cache-Control "public, immutable";
            }
        }

        # ── Certbot ACME ─────────────────────────────────────────────
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }
}
