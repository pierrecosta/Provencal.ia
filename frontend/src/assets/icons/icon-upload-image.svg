<!-- UPLOAD IMAGE — cadre image avec flèche montante -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#869121" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-label="Envoyer une image">
  <!-- Cadre image -->
  <rect x="3" y="6" width="18" height="14" rx="2"/>
  <!-- Montagne paysage -->
  <polyline points="3 16 7 11 11 14 14 11 21 16"/>
  <!-- Flèche upload (au-dessus du cadre) -->
  <line x1="12" y1="1" x2="12" y2="5.5"/>
  <polyline points="9.5 3.5 12 1 14.5 3.5"/>
</svg>
