<!-- TOGGLE LANGUE FR/PROV — deux lettres avec flèche double -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#869121" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-label="Changer de langue FR / Provençal">
  <!-- FR -->
  <text x="1" y="14" font-family="Georgia, serif" font-size="8" font-weight="bold" fill="#869121" stroke="none">FR</text>
  <!-- Flèche double -->
  <line x1="9" y1="8"  x2="15" y2="8"/>
  <polyline points="12.5 5.5 15 8 12.5 10.5"/>
  <line x1="15" y1="16" x2="9"  y2="16"/>
  <polyline points="11.5 13.5 9 16 11.5 18.5"/>
  <!-- OC (provençal) -->
  <text x="16" y="14" font-family="Georgia, serif" font-size="8" font-weight="bold" fill="#D5713F" stroke="none">OC</text>
</svg>
