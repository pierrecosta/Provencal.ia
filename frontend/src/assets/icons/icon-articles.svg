<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#869121" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-label="Actualités — Articles culturels">
  <!-- Journal replié -->
  <rect x="3" y="4" width="13" height="16" rx="1"/>
  <!-- Pli du journal (colonne droite) -->
  <rect x="14" y="6" width="7" height="12" rx="1"/>
  <!-- Titre article (barre large) -->
  <line x1="5.5" y1="8" x2="13.5" y2="8"/>
  <line x1="5.5" y1="11" x2="13.5" y2="11"/>
  <!-- Corps article (barres fines) -->
  <line x1="5.5" y1="14" x2="13.5" y2="14" stroke-width="1"/>
  <line x1="5.5" y1="16" x2="11" y2="16" stroke-width="1"/>
  <!-- Image placeholder colonne droite -->
  <rect x="15.5" y="7.5" width="4" height="3" rx="0.5" fill="#D5713F" stroke="none" opacity="0.6"/>
  <line x1="15.5" y1="13" x2="19.5" y2="13" stroke-width="1"/>
  <line x1="15.5" y1="15" x2="19.5" y2="15" stroke-width="1"/>
</svg>
