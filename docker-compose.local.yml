# ============================================================================
# docker-compose.local.yml — Test des images PRODUCTION en local
# Usage : docker compose -f docker-compose.local.yml up --build
# Accès : http://localhost:8000 (API) / http://localhost:3000 (front)
# ============================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: provencalia-local-db
    environment:
      POSTGRES_USER: provencalia_local
      POSTGRES_PASSWORD: local_password_only
      POSTGRES_DB: provencalia_local
    volumes:
      - pgdata-local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U provencalia_local -d provencalia_local"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: provencalia-local-back
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://provencalia_local:local_password_only@db:5432/provencalia_local
      SECRET_KEY: local-test-key-not-for-production-use-only
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: http://localhost:8000
    container_name: provencalia-local-front
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata-local:
