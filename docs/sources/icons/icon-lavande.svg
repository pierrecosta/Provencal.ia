<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#869121" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-label="Lavande — emblème de la Provence">
  <!-- Tige principale -->
  <line x1="12" y1="22" x2="12" y2="10"/>
  <!-- Tiges secondaires -->
  <line x1="12" y1="17" x2="9"  y2="14"/>
  <line x1="12" y1="17" x2="15" y2="14"/>
  <line x1="12" y1="14" x2="10" y2="11.5"/>
  <line x1="12" y1="14" x2="14" y2="11.5"/>
  <!-- Épis de lavande (ellipses violacées/olive) -->
  <!-- Épi central -->
  <ellipse cx="12" cy="7"  rx="1.3" ry="3.2" fill="#869121" opacity="0.9" stroke="none"/>
  <!-- Épi gauche 1 -->
  <ellipse cx="8.5" cy="12" rx="1.1" ry="2.5" transform="rotate(-20 8.5 12)" fill="#869121" opacity="0.75" stroke="none"/>
  <!-- Épi droit 1 -->
  <ellipse cx="15.5" cy="12" rx="1.1" ry="2.5" transform="rotate(20 15.5 12)" fill="#869121" opacity="0.75" stroke="none"/>
  <!-- Épi gauche 2 -->
  <ellipse cx="9.5" cy="9.5" rx="1" ry="2.2" transform="rotate(-15 9.5 9.5)" fill="#D5713F" opacity="0.65" stroke="none"/>
  <!-- Épi droit 2 -->
  <ellipse cx="14.5" cy="9.5" rx="1" ry="2.2" transform="rotate(15 14.5 9.5)" fill="#D5713F" opacity="0.65" stroke="none"/>
  <!-- Petits détails floraux sur l'épi central -->
  <line x1="11" y1="6" x2="10.2" y2="5.2" stroke="#F9F7F2" stroke-width="0.7"/>
  <line x1="13" y1="6" x2="13.8" y2="5.2" stroke="#F9F7F2" stroke-width="0.7"/>
  <line x1="11" y1="8" x2="10.2" y2="8.8" stroke="#F9F7F2" stroke-width="0.7"/>
  <line x1="13" y1="8" x2="13.8" y2="8.8" stroke="#F9F7F2" stroke-width="0.7"/>
</svg>
