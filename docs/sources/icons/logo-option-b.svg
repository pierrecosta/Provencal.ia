<!--
  LOGO OPTION B — "Le Soleil & la Croix de Provence"
  Concept : Soleil stylisé intégrant une croix de Provence (croix à double traverse),
             emblème héraldique de la Provence historique.
             Plus sobre, identité territoriale forte, sans référence explicite au livre.
  Couleurs : terracotta #D5713F (soleil, croix) + olive #869121 (texte, rayons secondaires)
  Format    : 120×40 — horizontal, adapté à la navbar desktop
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" aria-label="Provençal.ia — Logo">

  <!-- SOLEIL -->
  <circle cx="19" cy="20" r="8" fill="#D5713F" opacity="0.15"/>
  <circle cx="19" cy="20" r="5.5" fill="#D5713F" opacity="0.85"/>

  <!-- Rayons longs (4 cardinaux) -->
  <line x1="19" y1="9"  x2="19" y2="7"  stroke="#D5713F" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="19" y1="31" x2="19" y2="33" stroke="#D5713F" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="8"  y1="20" x2="6"  y2="20" stroke="#D5713F" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="30" y1="20" x2="32" y2="20" stroke="#D5713F" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Rayons diagonaux -->
  <line x1="12" y1="13" x2="10.5" y2="11.5" stroke="#869121" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="26" y1="27" x2="27.5" y2="28.5" stroke="#869121" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="26" y1="13" x2="27.5" y2="11.5" stroke="#869121" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="12" y1="27" x2="10.5" y2="28.5" stroke="#869121" stroke-width="1.2" stroke-linecap="round"/>

  <!-- CROIX DE PROVENCE (croix à double croisillon) inscrite dans le soleil -->
  <!-- Barre verticale -->
  <line x1="19" y1="15.5" x2="19" y2="24.5" stroke="#F9F7F2" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Croisillon haut (plus court) -->
  <line x1="16" y1="17.5" x2="22" y2="17.5" stroke="#F9F7F2" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Croisillon bas (plus long) -->
  <line x1="15" y1="20.5" x2="23" y2="20.5" stroke="#F9F7F2" stroke-width="1.8" stroke-linecap="round"/>

  <!-- TEXTE "Provençal.ia" -->
  <text x="38" y="18"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="13"
        font-weight="bold"
        fill="#2D2926"
        letter-spacing="0.2">Proven</text>
  <text x="77.5" y="18"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="13"
        font-weight="bold"
        fill="#869121"
        letter-spacing="0.2">çal</text>
  <text x="96" y="18"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="13"
        font-weight="bold"
        fill="#D5713F"
        letter-spacing="0.2">.ia</text>

  <!-- Filet décoratif -->
  <line x1="38" y1="21" x2="115" y2="21" stroke="#D1CEC7" stroke-width="0.8"/>
  <!-- Sous-titre -->
  <text x="38" y="29"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="6.5"
        fill="#869121"
        letter-spacing="1.2"
        font-style="italic">PORTAIL CULTUREL PROVENÇAL</text>
</svg>
