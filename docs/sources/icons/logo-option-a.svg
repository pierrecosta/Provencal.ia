<!--
  LOGO OPTION A — "La Cigale & le Livre"
  Concept : Cigale stylisée posée sur un livre ouvert.
             La cigale est l'emblème de la Provence par excellence.
             Le livre évoque la langue, la culture, la mémoire.
  Couleurs : vert olive #869121 (corps cigale, texte) + terracotta #D5713F (ailes, accent)
  Format    : 120×40 — horizontal, adapté à la navbar desktop
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" aria-label="Provençal.ia — Logo">

  <!-- LIVRE -->
  <rect x="2" y="20" width="16" height="12" rx="1" fill="none" stroke="#869121" stroke-width="1.4"/>
  <line x1="10" y1="20" x2="10" y2="32" stroke="#869121" stroke-width="1"/>
  <line x1="4"  y1="24" x2="9"  y2="24" stroke="#869121" stroke-width="0.8"/>
  <line x1="4"  y1="27" x2="9"  y2="27" stroke="#869121" stroke-width="0.8"/>
  <line x1="11" y1="24" x2="16" y2="24" stroke="#869121" stroke-width="0.8"/>
  <line x1="11" y1="27" x2="16" y2="27" stroke="#869121" stroke-width="0.8"/>

  <!-- CIGALE posée sur le livre -->
  <!-- Corps -->
  <ellipse cx="10" cy="17" rx="2.6" ry="3.8" fill="#869121" opacity="0.9"/>
  <!-- Tête -->
  <circle cx="10" cy="13" r="1.8" fill="#2D2926"/>
  <!-- Yeux -->
  <circle cx="9.2" cy="12.6" r="0.45" fill="#F9F7F2"/>
  <circle cx="10.8" cy="12.6" r="0.45" fill="#F9F7F2"/>
  <!-- Aile gauche -->
  <path d="M7.5 15.5 Q3 13 2.5 17.5 Q4 20 7.5 18.5" fill="#D5713F" opacity="0.65"/>
  <!-- Aile droite -->
  <path d="M12.5 15.5 Q17 13 17.5 17.5 Q16 20 12.5 18.5" fill="#D5713F" opacity="0.65"/>
  <!-- Antennes -->
  <path d="M9.2 11.5 Q7.5 9 6 8" stroke="#2D2926" stroke-width="0.8" fill="none"/>
  <path d="M10.8 11.5 Q12.5 9 14 8" stroke="#2D2926" stroke-width="0.8" fill="none"/>

  <!-- TEXTE "Provençal.ia" -->
  <text x="23" y="25"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="13"
        font-weight="bold"
        fill="#2D2926"
        letter-spacing="0.2">Proven</text>
  <text x="62.5" y="25"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="13"
        font-weight="bold"
        fill="#869121"
        letter-spacing="0.2">çal</text>
  <text x="81" y="25"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="13"
        font-weight="bold"
        fill="#D5713F"
        letter-spacing="0.2">.ia</text>

  <!-- Filet décoratif sous le texte (style journal) -->
  <line x1="23" y1="28" x2="100" y2="28" stroke="#D1CEC7" stroke-width="0.8"/>
  <!-- Sous-titre -->
  <text x="23" y="35"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="6.5"
        fill="#869121"
        letter-spacing="1.2"
        font-style="italic">PORTAIL CULTUREL PROVENÇAL</text>
</svg>
