# ============================================================================
# GitHub Actions — CI : Tests + Build + Push Docker Hub (privé)
#
# Déclenché sur : push sur main, tags v*, pull requests
# Secrets requis dans GitHub → Settings → Secrets :
#   DOCKERHUB_USERNAME   : pastaga
#   DOCKERHUB_TOKEN      : token Docker Hub (Read/Write)
# ============================================================================

name: CI — Test & Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FRONT_IMAGE: pastaga/provencal-front
  BACK_IMAGE:  pastaga/provencal-back

jobs:
  # ── Tests backend ────────────────────────────────────────────────────
  test:
    name: Tests backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
          SECRET_KEY: test-secret-key-for-ci
          ENVIRONMENT: development
        run: pytest -x -q

  # ── Build & Push images Docker ──────────────────────────────────────
  build:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    needs: test
    # Push uniquement sur main ou tags — pas sur les PRs
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          TAGS="sha-${SHA_SHORT},latest"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAGS="${TAGS},${{ github.ref_name }}"
          fi
          echo "back_tags=$(echo "$TAGS" | sed "s|[^,]*|${{ env.BACK_IMAGE }}:&|g")" >> $GITHUB_OUTPUT
          echo "front_tags=$(echo "$TAGS" | sed "s|[^,]*|${{ env.FRONT_IMAGE }}:&|g")" >> $GITHUB_OUTPUT
          echo "sha_tag=sha-${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: Build & Push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.back_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.front_tags }}
          build-args: |
            VITE_API_URL=https://le-provencal.ovh
          cache-from: type=gha
          cache-to: type=gha,mode=max
